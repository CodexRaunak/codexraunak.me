{{ define "main" }}
<article class="page post">
  <header class="page-header">
    <h1>{{ .Title }}</h1>
    {{- if eq .Section "posts" }}
    <div class="post-meta-line">{{ partial "post-meta.html" . }}</div>
    {{- with .Params.tags }}
    <div class="tags">
      {{- range . }}<span class="tag">{{ . }}</span>{{ end }}
    </div>
    {{- end }}
    {{- end }}
  </header>

  <div class="prose">
    {{ .Content }}
  </div>

  {{- if eq .Section "posts" }}
  <footer class="post-footer">
    <hr />
    <a href="{{ "/posts/" | relURL }}">← All posts</a>
  </footer>
  {{- end }}
</article>
{{ end }}
